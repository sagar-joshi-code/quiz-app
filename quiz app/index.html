<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div
      id="quizCard"
      class="h-100 w-150 rounded-2xl bg-blue-400 mx-100 my-50 shadow-lg"
    >
      <div class="flex justify-between">
        <h1 class="my-5 text-3xl font-bold text-white">🧠 Quiz App</h1>
        <span id="score" class="my-6 mx-3 text-green-900 text-2xl"
          >Score:0</span
        >
      </div>
      <p id="questionNumber" class="mx-13 text-xl text-blue-600">
        Question 1 of 10
      </p>
      <h2 id="question" class="mx-13 my-3 text-white text-2xl font-bold">
        Your question goes here?
      </h2>
      <div id="answers" class="grid grid-cols-2 gap-4">
        <!-- answers goes here -->
      </div>
      <button
        id="nextQuestion"
        class="mt-6 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition"
      >
        Next Question ➡️
      </button>
    </div>
    <div
      id="finalScore"
      class="hidden bg-blue-400 rounded-2xl text-white text-3xl font-bold text-center mx-100 my-50 p-10"
    ></div>
    <script src="script.js"></script>
  </body>
</html>
